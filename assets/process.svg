<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 250" width="100%" height="100%">
  <!-- Definitions for Gradients & Icons -->
  <defs>
    <!-- Arrow 1 Gradient (Cyan to Blue) -->
    <linearGradient id="grad1" x1="240" y1="0" x2="340" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#3A86FF" />
    </linearGradient>

    <!-- Arrow 2 Gradient (Blue to Purple) -->
    <linearGradient id="grad2" x1="570" y1="0" x2="670" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A86FF" />
      <stop offset="100%" stop-color="#B200FF" />
    </linearGradient>

    <!-- Gear Path -->
    <g id="gear-icon">
      <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
    </g>
  </defs>

  <!-- Background / Terminal Window -->
  <rect width="950" height="250" rx="8" fill="#0D1117" stroke="#30363D" stroke-width="1.5" />

  <!-- Terminal Window Controls -->
  <rect x="15" y="15" width="8" height="8" fill="#30363D" />
  <rect x="30" y="15" width="8" height="8" fill="#30363D" />
  <rect x="45" y="15" width="8" height="8" fill="#30363D" />

  <!-- ==========================================
       STEP 1: RECORD (Cyan)
       ========================================== -->
  <!-- Heavy Block Shadow -->
  <text x="94" y="94" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="64" font-weight="900" fill="#002b33">01</text>
  <!-- Foreground Number -->
  <text x="90" y="90" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="64" font-weight="900" fill="#00E5FF">01</text>

  <!-- Glowing Red Record Dot -->
  <circle cx="98" cy="135" r="8" fill="#FF3333" opacity="0.25" />
  <circle cx="98" cy="135" r="4" fill="#FF3333" />

  <text x="114" y="140" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16" font-weight="bold" fill="#00E5FF" letter-spacing="2">RECORD</text>

  <text x="90" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#C9D1D9">
    <tspan x="90" dy="0">Browse a website</tspan>
    <tspan x="90" dy="22">normally.</tspan>
  </text>


  <!-- ==========================================
       ARROW 1: Data Stream (Cyan -> Blue)
       ========================================== -->
  <!-- Shadows for Arrow 1 -->
  <rect x="244" y="138" width="8" height="8" fill="#011A30" />
  <rect x="260" y="138" width="8" height="8" fill="#011A30" />
  <polygon points="276,138 314,138 314,128 334,142 314,156 314,146 276,146" fill="#011A30" />

  <!-- Foreground for Arrow 1 -->
  <rect x="240" y="134" width="8" height="8" fill="url(#grad1)" />
  <rect x="256" y="134" width="8" height="8" fill="url(#grad1)" />
  <polygon points="272,134 310,134 310,124 330,138 310,152 310,142 272,142" fill="url(#grad1)" />


  <!-- ==========================================
       STEP 2: COMPILE (Blue)
       ========================================== -->
  <!-- Heavy Block Shadow -->
  <text x="394" y="94" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="64" font-weight="900" fill="#001D4A">02</text>
  <!-- Foreground Number -->
  <text x="390" y="90" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="64" font-weight="900" fill="#3A86FF">02</text>

  <!-- Gear Icon with Shadow -->
  <svg x="390" y="127" width="20" height="20" viewBox="0 0 24 24" fill="#001D4A">
    <use href="#gear-icon" />
  </svg>
  <svg x="388" y="125" width="20" height="20" viewBox="0 0 24 24" fill="#3A86FF">
    <use href="#gear-icon" />
  </svg>

  <text x="416" y="140" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16" font-weight="bold" fill="#3A86FF" letter-spacing="2">COMPILE</text>

  <text x="390" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#C9D1D9">
    <tspan x="390" dy="0">AI analyses video</tspan>
    <tspan x="390" dy="22">clips &amp; network</tspan>
    <tspan x="390" dy="22">requests.</tspan>
  </text>


  <!-- ==========================================
       ARROW 2: Data Stream (Blue -> Purple)
       ========================================== -->
  <!-- Shadows for Arrow 2 -->
  <rect x="574" y="138" width="8" height="8" fill="#16053D" />
  <rect x="590" y="138" width="8" height="8" fill="#16053D" />
  <polygon points="606,138 644,138 644,128 664,142 644,156 644,146 606,146" fill="#16053D" />

  <!-- Foreground for Arrow 2 -->
  <rect x="570" y="134" width="8" height="8" fill="url(#grad2)" />
  <rect x="586" y="134" width="8" height="8" fill="url(#grad2)" />
  <polygon points="602,134 640,134 640,124 660,138 640,152 640,142 602,142" fill="url(#grad2)" />


  <!-- ==========================================
       STEP 3: AGENT (Purple)
       ========================================== -->
  <!-- Heavy Block Shadow -->
  <text x="724" y="94" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="64" font-weight="900" fill="#33004A">03</text>
  <!-- Foreground Number -->
  <text x="720" y="90" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="64" font-weight="900" fill="#B200FF">03</text>

  <!-- Square Terminal App Icon -->
  <!-- Shadow -->
  <rect x="722" y="125" width="24" height="24" rx="4" fill="#160029" />
  <!-- Dark Purple Square Foreground -->
  <rect x="720" y="123" width="24" height="24" rx="4" fill="#3A0066" />
  <!-- White ">_" Text inside square -->
  <text x="723" y="139" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="900" fill="#FFFFFF">&gt;_</text>

  <text x="752" y="140" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16" font-weight="bold" fill="#B200FF" letter-spacing="2">AGENT</text>

  <text x="720" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#C9D1D9">
    <tspan x="720" dy="0">LLM investigates,</tspan>
    <tspan x="720" dy="22">writes &amp; tests a</tspan>
    <tspan x="720" dy="22">Python script.</tspan>
  </text>

</svg>
